name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust 1.85 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.85.0 --profile minimal --component clippy --component rustfmt

      - name: Check formatting
        run: cargo +1.85.0 fmt --all -- --check

      - name: Run tests
        run: cargo +1.85.0 test --workspace --locked

      - name: Run Clippy
        run: cargo +1.85.0 clippy --workspace --all-targets --locked -- -D warnings
